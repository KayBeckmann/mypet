name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend: Dart Analyse + Tests ──
  backend:
    name: Backend (Dart)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Compile (AOT check)
        run: dart compile exe bin/server.dart -o /tmp/server

  # ── Flutter Web Apps ──
  flutter-owner:
    name: Flutter web_owner
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_owner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web
        run: flutter build web --release

  flutter-vet:
    name: Flutter web_vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_vet

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web
        run: flutter build web --release

  flutter-provider:
    name: Flutter web_provider
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_provider

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web
        run: flutter build web --release

  flutter-admin:
    name: Flutter web_admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web
        run: flutter build web --release

  # ── Docker Build Check ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mypet-backend:${{ github.sha }} ./backend

      - name: Build web-owner image
        run: docker build -t mypet-web-owner:${{ github.sha }} ./web_owner
