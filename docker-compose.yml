version: '3.8'

# DEPLOYMENT-HINWEIS:
# Auf dem Produktions-Server kein lokales Build nötig!
# Images werden via GitHub Actions gebaut und im GHCR gehostet.
# Deployment: git pull && docker compose pull && docker compose up -d
#
# Für lokales Entwicklungs-Build (viel RAM benötigt):
#   make build && docker compose up -d

services:
  # PostgreSQL Datenbank
  db:
    image: postgres:16-alpine
    container_name: mypet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mypet}
      POSTGRES_USER: ${POSTGRES_USER:-mypet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mypet_user} -d ${POSTGRES_DB:-mypet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dart Backend
  backend:
    image: ghcr.io/kaybeckmann/mypet/backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mypet-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mypet}
      POSTGRES_USER: ${POSTGRES_USER:-mypet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-3600}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@mypet.local}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-change-me-in-production}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Super Admin}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  # Flutter Web - Tierbesitzer
  web-owner:
    image: ghcr.io/kaybeckmann/mypet/web-owner:latest
    build:
      context: .
      dockerfile: web_owner/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    container_name: mypet-web-owner
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${OWNER_PORT:-3001}:80"

  # Flutter Web - Tierarzt
  web-vet:
    image: ghcr.io/kaybeckmann/mypet/web-vet:latest
    build:
      context: .
      dockerfile: web_vet/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    container_name: mypet-web-vet
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${VET_PORT:-3002}:80"

  # Flutter Web - Dienstleister
  web-provider:
    image: ghcr.io/kaybeckmann/mypet/web-provider:latest
    build:
      context: .
      dockerfile: web_provider/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    container_name: mypet-web-provider
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PROVIDER_PORT:-3003}:80"

  # Flutter Web - Superadmin Dashboard
  web-admin:
    image: ghcr.io/kaybeckmann/mypet/web-admin:latest
    build:
      context: .
      dockerfile: web_admin/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    container_name: mypet-web-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-3004}:80"

  # Flutter Android - Tierbesitzer App (APK Builder)
  android-owner:
    build:
      context: .
      dockerfile: android_owner/Dockerfile
      args:
        API_BASE_URL: ${ANDROID_API_URL:-http://10.0.2.2:8080}
    container_name: mypet-android-owner
    volumes:
      - android-apk:/app
    profiles:
      - android

volumes:
  postgres-data:
  uploads:
  android-apk:
