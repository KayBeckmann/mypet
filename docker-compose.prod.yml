version: '3.8'

# Produktions-Deployment
# Verwendung: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Erforderliche Umgebungsvariablen (via .env oder Systemvariablen):
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   JWT_SECRET, ENCRYPTION_KEY
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM  (optional)

services:
  db:
    restart: always
    # Port NICHT nach außen freigeben in Produktion
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-3600}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      DEBUG: "false"
      LOG_LEVEL: "warn"
      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  web-owner:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m

  web-vet:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m

  web-provider:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m

  web-admin:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m
