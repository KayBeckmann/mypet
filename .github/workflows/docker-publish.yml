name: Build & Publish Docker Images

on:
  push:
    branches: [master]

jobs:
  # ── Backend (Dart) ──────────────────────────────────────────────────────
  backend:
    name: Build backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/mypet/backend:latest ./backend

      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository_owner }}/mypet/backend:latest

  # ── Flutter Web — Tierbesitzer ──────────────────────────────────────────
  web-owner:
    name: Build web-owner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build web-owner image
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_owner/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-owner:latest \
            .

      - name: Push web-owner image
        run: docker push ghcr.io/${{ github.repository_owner }}/mypet/web-owner:latest

  # ── Flutter Web — Tierarzt ──────────────────────────────────────────────
  web-vet:
    name: Build web-vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build web-vet image
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_vet/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-vet:latest \
            .

      - name: Push web-vet image
        run: docker push ghcr.io/${{ github.repository_owner }}/mypet/web-vet:latest

  # ── Flutter Web — Dienstleister ─────────────────────────────────────────
  web-provider:
    name: Build web-provider
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build web-provider image
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_provider/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-provider:latest \
            .

      - name: Push web-provider image
        run: docker push ghcr.io/${{ github.repository_owner }}/mypet/web-provider:latest

  # ── Flutter Web — Superadmin ────────────────────────────────────────────
  web-admin:
    name: Build web-admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build web-admin image
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_admin/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-admin:latest \
            .

      - name: Push web-admin image
        run: docker push ghcr.io/${{ github.repository_owner }}/mypet/web-admin:latest
