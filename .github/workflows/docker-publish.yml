name: Build & Publish Docker Images

# Baut alle Service-Images und pushed sie ins GitHub Container Registry (GHCR).
# Der Produktions-Server muss dann nur noch `docker compose pull && docker compose up -d` ausführen.
#
# Voraussetzung: Repository-Variable "API_BASE_URL" in GitHub setzen
#   Settings → Secrets and variables → Actions → Variables → New repository variable
#   Name: API_BASE_URL   Value: http://<server-ip>:8080

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/mypet

jobs:
  # ── Backend (Dart) ──────────────────────────────────────────────────────
  backend:
    name: Build backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/mypet/backend:latest ./backend
          docker push ghcr.io/${{ github.repository_owner }}/mypet/backend:latest

  # ── Flutter Web — Tierbesitzer ──────────────────────────────────────────
  web-owner:
    name: Build web-owner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push web-owner
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_owner/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-owner:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/mypet/web-owner:latest

  # ── Flutter Web — Tierarzt ──────────────────────────────────────────────
  web-vet:
    name: Build web-vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push web-vet
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_vet/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-vet:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/mypet/web-vet:latest

  # ── Flutter Web — Dienstleister ─────────────────────────────────────────
  web-provider:
    name: Build web-provider
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push web-provider
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_provider/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-provider:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/mypet/web-provider:latest

  # ── Flutter Web — Superadmin ────────────────────────────────────────────
  web-admin:
    name: Build web-admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push web-admin
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_admin/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/mypet/web-admin:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/mypet/web-admin:latest
