name: Build & Publish Docker Images

# Baut alle Service-Images und pushed sie ins GitHub Container Registry (GHCR).
# Der Produktions-Server muss dann nur noch `docker compose pull && docker compose up -d` ausführen.
#
# Voraussetzung: Repository-Variable "API_BASE_URL" in GitHub setzen
#   Settings → Secrets and variables → Actions → Variables → New repository variable
#   Name: API_BASE_URL   Value: http://<server-ip>:8080

on:
  push:
    branches: [master]

jobs:
  # ── Backend (Dart) ──────────────────────────────────────────────────────
  backend:
    name: Build backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push backend
        run: |
          docker buildx build \
            --push \
            --no-cache \
            -t ghcr.io/${{ env.OWNER }}/mypet-backend:latest \
            ./backend

  # ── Flutter Web — Tierbesitzer ──────────────────────────────────────────
  web-owner:
    name: Build web-owner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push web-owner
        run: |
          docker buildx build \
            --push \
            --no-cache \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_owner/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/mypet-web-owner:latest \
            .

  # ── Flutter Web — Tierarzt ──────────────────────────────────────────────
  web-vet:
    name: Build web-vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push web-vet
        run: |
          docker buildx build \
            --push \
            --no-cache \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_vet/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/mypet-web-vet:latest \
            .

  # ── Flutter Web — Dienstleister ─────────────────────────────────────────
  web-provider:
    name: Build web-provider
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push web-provider
        run: |
          docker buildx build \
            --push \
            --no-cache \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_provider/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/mypet-web-provider:latest \
            .

  # ── Flutter Web — Superadmin ────────────────────────────────────────────
  web-admin:
    name: Build web-admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push web-admin
        run: |
          docker buildx build \
            --push \
            --no-cache \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL || 'http://localhost:8080' }}" \
            -f web_admin/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/mypet-web-admin:latest \
            .
